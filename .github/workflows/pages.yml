name: Deploy GitHub Pages Snapshot

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "12 2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[data]

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build latest research snapshot
        run: python -m quant_factor_lab run --config examples/demo_config.json

      - name: Export static site
        env:
          QFL_API_BASE_URL: ${{ vars.QFL_API_BASE_URL }}
        run: python -m quant_factor_lab export-site --config examples/demo_config.json --site-dir site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
